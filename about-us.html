<head>

    <link rel="stylesheet" href="assets/css/about-us.css">
</head>

<body class="about-page">
    <header class="navbar navbar-expand-lg">
        <div class="navbar-inner">
            <a href="about-us.html" class="nav-link-item">About us</a>
            <a href="#" class="nav-link-item">Work</a>
            <a href="index.html" class="navbar-logo">
                <img src="assets/images/logo.png" alt="Logo" />
            </a>
            <a href="#" class="nav-link-item">Blog</a>
            <div class="nav-contact-group">
                <a href="#" class="nav-link-item">Contact</a>
                <a href="#" class="nav-link-item lang-toggle" id="langToggle">VN</a>
            </div>
            <button class="nav-hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-inner">
            <a href="about-us.html" class="mobile-menu-item">About us</a>
            <a href="#" class="mobile-menu-item">Work</a>
            <a href="#" class="mobile-menu-item">Blog</a>
            <a href="#" class="mobile-menu-item">Contact</a>
            <a href="#" class="mobile-menu-item mobile-menu-lang" id="langToggleMobile">VN</a>
        </div>
    </div>

    <section class="about-hero-gallery">
        <div class="gallery-track" id="galleryTrack">
            <div class="gallery-item"><img src="assets/images/gallery1.jpg" alt="Gallery 1"></div>
            <div class="gallery-item"><img src="assets/images/gallery2.jpg" alt="Gallery 2"></div>
            <div class="gallery-item"><img src="assets/images/gallery3.jpg" alt="Gallery 3"></div>
            <div class="gallery-item"><img src="assets/images/gallery4.jpg" alt="Gallery 4"></div>
            <div class="gallery-item"><img src="assets/images/gallery5.jpg" alt="Gallery 5"></div>
            <div class="gallery-item"><img src="assets/images/gallery6.jpg" alt="Gallery 6"></div>
            <div class="gallery-item"><img src="assets/images/gallery7.jpg" alt="Gallery 7"></div>
            <div class="gallery-item"><img src="assets/images/gallery8.jpg" alt="Gallery 8"></div>
            <div class="gallery-item"><img src="assets/images/gallery9.jpg" alt="Gallery 9"></div>
        </div>
    </section>

    <section class="solution-section-wrapper" id="solutionSection">
        <div class="solution-sticky-zone">
            <div class="container-fluid px-4 px-md-5">
                <div class="row">
                    <div class="col-12 testimonial-title-container">

                        <h2 class="testimonial-title text-left scroll-slide-left solution-text-1">GIẢI PHÁP</h2>

                        <div class="solution-right-group">
                            <h2 class="testimonial-title scroll-slide-right">THIẾT KẾ CHO</h2>
                        </div>

                        <h2 class="testimonial-title brand-line scroll-slide-up">
                            <span class="text-old">THƯƠNG HIỆU</span>
                            <span class="text-new">DOANH NGHIỆP</span>
                        </h2>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="assets/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const track = document.getElementById('galleryTrack');
            if (track) {
                const originalItems = Array.from(track.children);
                const totalItems = originalItems.length;
                originalItems.forEach((item, index) => item.style.setProperty('--i', index + 1));
                originalItems.forEach((item, index) => {
                    const clone = item.cloneNode(true);
                    clone.style.setProperty('--i', totalItems + index + 1);
                    clone.setAttribute('aria-hidden', 'true');
                    track.appendChild(clone);
                });
            }

            let hasScrolled = false;

            const animatedTexts = document.querySelectorAll('.scroll-slide-left, .scroll-slide-right, .scroll-slide-up');

            function initTextObserver() {
                if (animatedTexts.length === 0) return;
                const textObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('is-visible');
                        } else {
                            entry.target.classList.remove('is-visible');
                        }
                    });
                }, { threshold: 0.2 });
                animatedTexts.forEach(text => textObserver.observe(text));
            }

            window.addEventListener('scroll', () => {
                if (!hasScrolled) {
                    hasScrolled = true;
                    initTextObserver();
                }
            }, { once: false, passive: true });

            const solutionSection = document.getElementById('solutionSection');
            const brandLine = document.querySelector('.brand-line');

            if (solutionSection && brandLine) {
                const isMobile = window.innerWidth <= 765;
                const snapDelay = isMobile ? 800 : 600;

                let targetSolutionProgress = 0;
                let currentSolutionProgress = 0;
                let solutionSnapTimeout;
                let solutionLastScrollY = window.scrollY;

                const textNew = brandLine.querySelector('.text-new');
                if (textNew) {
                    textNew.style.webkitClipPath = 'inset(100% 0 0 0)';
                    textNew.style.clipPath = 'inset(100% 0 0 0)';
                }

                function renderSolutionSmooth() {
                    currentSolutionProgress += (targetSolutionProgress - currentSolutionProgress) * 0.05;

                    if (textNew) {
                        let progress = currentSolutionProgress;
                        if (progress < 0) progress = 0;
                        if (progress > 1) progress = 1;

                        const insetTop = (1 - progress) * 100;
                        textNew.style.webkitClipPath = `inset(${insetTop}% 0 0 0)`;
                        textNew.style.clipPath = `inset(${insetTop}% 0 0 0)`;
                    }
                    requestAnimationFrame(renderSolutionSmooth);
                }

                requestAnimationFrame(renderSolutionSmooth);

                window.addEventListener('scroll', () => {
                    const sectionTop = solutionSection.offsetTop;
                    const scrollY = window.scrollY;
                    const windowHeight = window.innerHeight;

                    const scrollDirection = scrollY > solutionLastScrollY ? 'down' : 'up';
                    solutionLastScrollY = scrollY;

                    let scrolledInside = scrollY - sectionTop;
                    if (scrolledInside < 0) scrolledInside = 0;

                    const maxScroll = solutionSection.offsetHeight - windowHeight;
                    if (scrolledInside > maxScroll) scrolledInside = maxScroll;

                    if (maxScroll > 0) {
                        targetSolutionProgress = scrolledInside / maxScroll;
                    }

                    clearTimeout(solutionSnapTimeout);

                    if (scrollY > sectionTop && scrollY < sectionTop + maxScroll) {
                        solutionSnapTimeout = setTimeout(() => {
                            let snapTargetY;

                            if (scrollDirection === 'down') {
                                if (targetSolutionProgress >= 0.1) {
                                    snapTargetY = sectionTop + maxScroll;
                                } else {
                                    snapTargetY = sectionTop;
                                }
                            } else {
                                if (targetSolutionProgress <= 0.9) {
                                    snapTargetY = sectionTop;
                                } else {
                                    snapTargetY = sectionTop + maxScroll;
                                }
                            }

                            if (Math.abs(scrollY - snapTargetY) > 5) {
                                window.scrollTo({
                                    top: snapTargetY,
                                    behavior: 'smooth'
                                });
                            }
                        }, snapDelay);
                    }
                }, { passive: true });
            }
        });
    </script>
</body>
